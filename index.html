<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KiwiNest 2.0 Alpha</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./favicon.png" />
    <meta name="theme-color" content="#7c9f4a" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/nest.css" />
    <link rel="stylesheet" href="./css/diary.css" />
    <link rel="stylesheet" href="./css/meta.css" />
    <link rel="stylesheet" href="./css/calm.css" />
    <link rel="stylesheet" href="./css/review.css" />
    <link rel="stylesheet" href="./css/kiwi.css" />
    <link rel="stylesheet" href="./css/settings.css" />
    <link rel="stylesheet" href="./css/mobile.css" />
    <script type="module" src="./js/main.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">KiwiNest 2.0 Alpha v6</p>
          <h1>🥝 KiwiNest</h1>
          <p class="subtitle">공부하고, 설명하고, 메타인지·회복·복습·수집·보상으로 내 공부 방식을 키우는 둥지예요.</p>
        </div>
      </header>

      <nav class="tab-nav" aria-label="주요 탭">
        <button class="tab-button is-active" type="button" data-tab-target="home">둥지 홈</button>
        <button class="tab-button" type="button" data-tab-target="diary">공부 일기장</button>
        <button class="tab-button" type="button" data-tab-target="meta">메타인지</button>
        <button class="tab-button" type="button" data-tab-target="calm">마음 안정소</button>
        <button class="tab-button" type="button" data-tab-target="review">복습 둥지</button>
        <button class="tab-button" type="button" data-tab-target="kiwi">키위 도감</button>
        <button class="tab-button" type="button" data-tab-target="settings">설정</button>
      </nav>

      <main class="tab-container">
        <section id="home" class="tab-panel is-active" aria-label="둥지 홈"></section>
        <section id="diary" class="tab-panel" aria-label="공부 일기장"></section>
        <section id="meta" class="tab-panel" aria-label="메타인지 실험실"></section>
        <section id="calm" class="tab-panel" aria-label="마음 안정소"></section>
        <section id="review" class="tab-panel" aria-label="복습 둥지"></section>
        <section id="kiwi" class="tab-panel" aria-label="키위 도감"></section>
        <section id="settings" class="tab-panel" aria-label="설정"></section>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </body>
</html>
